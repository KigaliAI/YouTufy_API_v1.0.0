<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password – YouTufy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>🔑 Reset Your Password</h1>
  </header>

  <main class="container">
    <form id="reset-form" class="form">
      <label for="email">📧 Enter your email address:</label><br>
      <input type="email" id="email" name="email" required /><br><br>

      <button type="submit" class="btn">📩 Send Reset Link</button>
    </form>

    <p id="message" style="margin-top: 1rem; font-weight: bold;"></p>
  </main>

  <footer>
    <p>
      © 2025 YouTufy |
      <a href="/auth/privacy.html">Privacy Policy</a> |
      <a href="/auth/terms.html">Terms of Service</a> |
      <a href="/auth/cookie.html">Cookies</a>
    </p>
  </footer>

  <script>
    document.getElementById('reset-form').onsubmit = async e => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const res = await fetch('https://api.youtufy.com/auth/reset-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email })
      });

      const data = await res.json();
      document.getElementById('message').innerText = data.message;
    };
  </script>
</body>
</html>
