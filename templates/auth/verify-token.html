<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Your Password</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header><h1>🔐 Reset Password</h1></header>
  <main class="container">
    <form method="post" action="/auth/verify-token.html">
      <input type="hidden" name="token" value="{{ request.query_params['token'] }}">
      <label>New Password:</label><br>
      <input type="password" name="new_password" required><br><br>
      <button class="btn" type="submit" style="background: yellow;">🔁 Reset Password</button>
    </form>
  </main>
</body>
</html>
